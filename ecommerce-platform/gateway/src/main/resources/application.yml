server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # AI 服务路由
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/ai/**
          filters:
            - StripPrefix=0
        # 业务服务路由
        - id: biz-service
          uri: lb://biz-service
          predicates:
            - Path=/biz/**
          filters:
            - StripPrefix=0

# 日志配置
logging:
  level:
    com.platform.gateway: debug
    org.springframework.cloud.gateway: debug
