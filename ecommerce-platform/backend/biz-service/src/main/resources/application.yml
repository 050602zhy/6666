server:
  port: 8082

spring:
  application:
    name: biz-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
        import-check:
          enabled: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/biz?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# SpringDoc OpenAPI 配置 (Knife4j 4.x 基于 SpringDoc)
springdoc:
  api-docs:
    # 启用 OpenAPI 文档端点
    enabled: true
    # 文档端点路径
    path: /v3/api-docs

# Knife4j 增强配置
knife4j:
  enable: true
  setting:
    swagger-model-name: 业务服务模型
    enable-swagger-models: true
    enable-tag-groups: true

# 日志配置
logging:
  level:
    com.platform.biz: debug
