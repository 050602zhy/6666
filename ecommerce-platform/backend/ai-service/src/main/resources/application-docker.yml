# ai-service Docker环境配置
server:
  port: 8081

spring:
  application:
    name: ai-service
  cloud:
    nacos:
      discovery:
        server-addr: host.docker.internal:8848
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        ip-delete-timeout: 30000
      config:
        server-addr: host.docker.internal:8848
        file-extension: yml
        import-check:
          enabled: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://host.docker.internal:3306/ecommerce?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 050602zhy
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

# Chroma 向量数据库配置 - Docker环境下通过环境变量注入
chroma:
  host: ${CHROMA_HOST:http://chroma}
  port: ${CHROMA_PORT:8000}
  collection-prefix: ecommerce_kb_

# AI 配置 - 通过环境变量注入避免硬编码
ai:
  api-key: ${AI_API_KEY:ark-78ed53a1-9a28-4e0f-bf09-eb8b57c6a974-7c884}
  base-url: ${AI_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
  endpoint-id: ${AI_ENDPOINT_ID:ep-20260715134001-j27km}
  temperature: 0.7

knife4j:
  enable: true
  setting:
    swagger-model-name: AI智能服务模型
    enable-swagger-models: true
    enable-tag-groups: true

logging:
  level:
    com.platform.ai: info
