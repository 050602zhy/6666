server:
  port: 8081

spring:
  application:
    name: ai-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
        import-check:
          enabled: false

# SpringDoc OpenAPI 配置 (Knife4j 4.x 基于 SpringDoc)
springdoc:
  api-docs:
    # 启用 OpenAPI 文档端点
    enabled: true
    # 文档端点路径
    path: /v3/api-docs

# Knife4j 增强配置
knife4j:
  enable: true
  setting:
    swagger-model-name: AI智能服务模型
    enable-swagger-models: true
    enable-tag-groups: true

# 日志配置
logging:
  level:
    com.platform.ai: debug
