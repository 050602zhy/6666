server:
  port: 8081

spring:
  application:
    name: ai-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        ip-delete-timeout: 30000
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
        import-check:
          enabled: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/ecommerce?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 050602zhy
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

# Chroma 向量数据库配置
chroma:
  host: http://127.0.0.1
  port: 8000
  collection-prefix: ecommerce_kb_

# AI 配置（直接通过 HTTP 调用，不依赖 Spring AI 自动配置）
ai:
  api-key: ark-78ed53a1-9a28-4e0f-bf09-eb8b57c6a974-7c884
  base-url: https://ark.cn-beijing.volces.com/api/v3
  # 接入点 ID（ep-xxx），创建推理接入点后获取
  endpoint-id: ep-20260715134001-j27km
  temperature: 0.7

# SpringDoc OpenAPI 配置 (Knife4j 4.x 基于 SpringDoc)
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

# Knife4j 增强配置
knife4j:
  enable: true
  setting:
    swagger-model-name: AI智能服务模型
    enable-swagger-models: true
    enable-tag-groups: true

# 日志配置
logging:
  level:
    com.platform.ai: debug